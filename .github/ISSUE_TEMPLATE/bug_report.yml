name: Bug report
description: Report incorrect validation, CLI behavior, or preview output.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal IR fixture
      description: Remove confidential slide content before posting.
      render: json
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, and exact command.
